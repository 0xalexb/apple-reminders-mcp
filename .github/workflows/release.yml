name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball sha256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          curl -sL "https://github.com/0xalexb/apple-reminders-mcp/archive/refs/tags/v${VERSION}.tar.gz" -o source.tar.gz
          echo "sha256=$(shasum -a 256 source.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-apps
        uses: actions/checkout@v4
        with:
          repository: 0xalexb/homebrew-apps
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cat > Formula/apple-reminders-mcp.rb <<FORMULA_EOF
          class AppleRemindersMcp < Formula
            desc "MCP server for Apple Reminders via EventKit"
            homepage "https://github.com/0xalexb/apple-reminders-mcp"
            url "https://github.com/0xalexb/apple-reminders-mcp/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on :macos
            depends_on "uv"

            def install
              venv = libexec/"venv"
              system "uv", "venv", "--python", "3.11", venv
              system "uv", "pip", "install", "--python", venv/"bin/python", "."
              bin.install_symlink venv/"bin/apple-reminders-mcp"
            end

            test do
              assert_match "apple-reminders-mcp", shell_output("#{bin}/apple-reminders-mcp --version 2>&1")
            end
          end
          FORMULA_EOF

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/apple-reminders-mcp.rb
          git commit -m "Update apple-reminders-mcp to ${VERSION}"
          git push
